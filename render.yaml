services:
  - type: web
    name: elfis-core-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    region: frankfurt
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: AUTH_REQUIRED
        value: "true"
      - key: DATABASE_URL
        value: sqlite:////data/comptapilot.db
      - key: STORAGE_DIR
        value: /data/storage
      - key: CORS_ORIGINS
        value: https://elfis-core.com,https://www.elfis-core.com,https://elfis-core.web.app,https://elfis-core.firebaseapp.com
      - key: JWT_SECRET
        generateValue: true
      - key: FIREBASE_PROJECT_ID
        value: elfis-core
      - key: FIREBASE_WEB_API_KEY
        value: AIzaSyBfPpjwJoWxVvfAQskrNbas-CEtUqILRW4
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://elfis-core.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_TRIAL_DAYS
        value: "14"
      - key: STRIPE_PAST_DUE_GRACE_DAYS
        value: "3"
      - key: PLATFORM_ADMIN_EMAILS
        value: johnjuniort40@gmail.com
    disk:
      name: elfis-core-data
      mountPath: /data
      sizeGB: 1
